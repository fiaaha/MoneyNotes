<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fitur Catat - MoneyNotes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-900 text-indigo-100 min-h-screen">
  <header class="bg-slate-800 py-4 shadow-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
      <a href="dashboard.html" class="flex items-center text-white hover:text-blue-400 transition font-bold">
          ← Kembali ke Dashboard
      </a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-12">
    <h2 class="text-3xl font-bold mb-8 text-center">Pencatatan Keuangan</h2>

    <div class="flex flex-wrap justify-center gap-2 mb-8">
      <button class="tab-btn active-tab bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold" data-tab="form-income">Pemasukan</button>
      <button class="tab-btn bg-slate-800 text-slate-400 px-6 py-2 rounded-lg font-semibold" data-tab="form-expense">Pengeluaran</button>
      <button class="tab-btn bg-slate-800 text-slate-400 px-6 py-2 rounded-lg font-semibold" data-tab="form-saving">Tabungan</button>
      <button class="tab-btn bg-slate-800 text-slate-400 px-6 py-2 rounded-lg font-semibold" data-tab="form-debt">Hutang & Piutang</button>
    </div>

    <div id="form-income" class="tab-content block bg-slate-800 p-8 rounded-xl shadow-lg">
      <h3 class="font-bold text-xl mb-6 text-emerald-400">Catat Pemasukan</h3>
      <form id="income-form" class="space-y-4">
          <input type="number" id="inc-amount" placeholder="Nominal (Rp)" required class="w-full bg-slate-700 p-3 rounded-lg outline-none text-white">
          <input type="text" id="inc-note" placeholder="Sumber (Misal: Gaji, Jualan)" required class="w-full bg-slate-700 p-3 rounded-lg outline-none text-white">
          <button type="submit" class="w-full bg-emerald-600 py-3 rounded-lg font-bold hover:bg-emerald-700 transition">Simpan Pemasukan</button>
      </form>
    </div>

    <div id="form-expense" class="tab-content hidden bg-slate-800 p-8 rounded-xl shadow-lg">
      <h3 class="font-bold text-xl mb-6 text-red-400">Catat Pengeluaran</h3>
      <form id="expense-form" class="space-y-4">
          <input type="number" id="exp-amount" placeholder="Nominal (Rp)" required class="w-full bg-slate-700 p-3 rounded-lg outline-none text-white">
          <input type="text" id="exp-note" placeholder="Keterangan Pengeluaran" required class="w-full bg-slate-700 p-3 rounded-lg outline-none text-white">
          <button type="submit" class="w-full bg-red-600 py-3 rounded-lg font-bold hover:bg-red-700 transition">Simpan Pengeluaran</button>
      </form>
    </div>

    <div id="form-saving" class="tab-content hidden bg-slate-800 p-8 rounded-xl shadow-lg">
      <h3 class="font-bold text-xl mb-6 text-blue-400">Rencana Tabungan</h3>
      <form id="savings-form" class="space-y-4">
          <input type="number" id="sav-amount" placeholder="Nominal (Rp)" required class="w-full bg-slate-700 p-3 rounded-lg outline-none text-white">
          <input type="text" id="sav-goal" placeholder="Tujuan Tabungan" required class="w-full bg-slate-700 p-3 rounded-lg outline-none text-white">
          <button type="submit" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-700 transition">Simpan Tabungan</button>
      </form>
    </div>

    <div id="form-debt" class="tab-content hidden bg-slate-800 p-8 rounded-xl shadow-lg">
      <h3 class="font-bold text-xl mb-4 text-center">Catatan Hutang & Piutang</h3>
      <p class="text-xs text-center text-slate-400 mb-4">Hanya sebagai catatan, tidak akan memotong/menambah saldo hingga statusnya dilunasi.</p>
      <form id="debt-form" class="space-y-4">
          <div class="flex gap-2 mb-4">
              <button type="button" id="type-owe" class="flex-1 bg-blue-600 py-2 rounded font-bold text-sm text-white">Saya Berhutang</button>
              <button type="button" id="type-owed" class="flex-1 bg-slate-700 py-2 rounded font-bold text-sm text-white">Orang Berhutang ke Saya</button>
          </div>
          <input type="number" id="debt-amount" placeholder="Nominal (Rp)" required class="w-full bg-slate-700 p-3 rounded-lg outline-none text-white">
          <input type="text" id="debt-person" placeholder="Nama Orang" required class="w-full bg-slate-700 p-3 rounded-lg outline-none text-white">
          
          <div id="reminder-container" class="block">
              <div class="text-xs text-slate-400 mb-1">Pilih Tanggal Pengingat (Jatuh Tempo):</div>
              <input type="date" id="debt-reminder" class="w-full bg-slate-700 p-3 rounded-lg outline-none text-white">
          </div>
          
          <button type="submit" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-700 transition">Simpan Catatan</button>
      </form>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
