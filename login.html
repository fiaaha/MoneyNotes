<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - MoneyNotes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-6">
  <div class="bg-slate-800 p-10 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700 text-indigo-100">
    <h2 class="text-3xl font-bold text-center mb-2">Welcome Back</h2>
    <p class="text-slate-400 text-center mb-8 text-sm">Masuk untuk mengelola finansialmu.</p>
    <form id="login-form" class="space-y-6">
      <div>
        <label class="block text-sm font-medium mb-2">Username</label>
        <input type="text" id="username" required class="w-full bg-slate-700 p-3 rounded-lg outline-none border border-slate-600 focus:border-blue-500 transition">
      </div>
      <div>
        <label class="block text-sm font-medium mb-2">Password</label>
        <input type="password" id="password" placeholder="••••••••" required class="w-full bg-slate-700 p-3 rounded-lg outline-none border border-slate-600 focus:border-blue-500 transition">
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold transition shadow-lg shadow-blue-900/30">Login</button>
    </form>
    <p class="mt-6 text-center text-xs text-slate-500 italic font-mono">Password: 123456</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
