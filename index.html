<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MoneyNotes - Smart Finance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-900 text-indigo-100 min-h-screen">
  <header class="bg-slate-800 py-4 shadow-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
      <div class="font-bold text-2xl flex items-center">
        <img src="https://img.icons8.com/ios-filled/24/ffffff/money.png" alt="Logo" class="mr-2" />
        MoneyNotes
      </div>
      <nav>
        <a href="login.html" class="border-2 border-slate-500 text-slate-300 px-5 py-2 rounded-md font-semibold hover:bg-blue-600 hover:text-white transition">Login</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="max-w-6xl mx-auto px-6 py-24 grid md:grid-cols-2 gap-8 items-center">
      <div>
        <h1 class="text-5xl font-bold mb-6">Kelola Keuangan dengan <span class="text-blue-500">Cerdas</span></h1>
        <p class="text-xl text-slate-400 mb-10 leading-relaxed">Satu platform untuk mencatat pemasukan, pengeluaran, tabungan, hingga pengingat hutang secara otomatis.</p>
        <a href="login.html" class="bg-blue-600 text-white px-10 py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-xl shadow-blue-900/20">Coba Sekarang</a>
      </div>
      <div class="hidden md:block">
        <img src="https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?auto=format&fit=crop&w=800&q=80" alt="Finance" class="rounded-2xl shadow-2xl" />
      </div>
    </section>
  </main>

</html>
