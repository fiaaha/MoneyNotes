<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard - MoneyNotes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-900 text-indigo-100 min-h-screen">
  <header class="bg-slate-800 py-4 shadow-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
      <div class="font-bold text-xl">MoneyNotes Dashboard</div>
      <div class="flex items-center gap-4">
        <span id="welcome-user" class="text-sm text-slate-400"></span>
        <button id="btn-logout" class="text-red-400 text-sm font-bold hover:text-red-300">Logout</button>
      </div>
    </div>
  </header>

  <main id="dashboard-section" class="max-w-6xl mx-auto px-6 py-10">
    <div class="bg-slate-800 p-4 rounded-xl border-l-4 border-blue-500 mb-8 max-w-2xl">
        <p id="quote-text" class="italic text-slate-300 text-sm">"Loading quote..."</p>
        <p id="quote-author" class="text-blue-400 text-xs font-bold mt-1">-</p>
    </div>

    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Ringkasan Keuangan</h2>
        <a href="features.html" class="bg-emerald-600 hover:bg-emerald-700 px-6 py-2 rounded-lg font-bold text-sm transition">+ Catat Baru</a>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 mb-10">
      <div class="bg-slate-800 p-6 rounded-xl border-b-4 border-blue-500">
        <div class="text-slate-400 text-xs uppercase font-bold mb-1">Saldo Utama</div>
        <div id="total-balance" class="text-2xl font-bold">Rp. 0</div>
      </div>
      <div class="bg-slate-800 p-6 rounded-xl border-b-4 border-emerald-500 text-emerald-400">
        <div class="text-slate-400 text-xs uppercase font-bold mb-1">Pemasukan</div>
        <div id="total-income" class="text-2xl font-bold">Rp. 0</div>
      </div>
      <div class="bg-slate-800 p-6 rounded-xl border-b-4 border-red-500 text-red-400">
        <div class="text-slate-400 text-xs uppercase font-bold mb-1">Pengeluaran</div>
        <div id="total-expenses" class="text-2xl font-bold">Rp. 0</div>
      </div>
      <div class="bg-slate-800 p-6 rounded-xl border-b-4 border-orange-500 text-orange-400">
        <div class="text-slate-400 text-xs uppercase font-bold mb-1">Tabungan</div>
        <div id="total-savings" class="text-2xl font-bold">Rp. 0</div>
      </div>
    </div>

    <div class="bg-slate-800 rounded-2xl p-6 shadow-xl mb-8">
      <h3 class="font-bold text-lg text-slate-300 mb-4 border-b border-slate-700 pb-2">Catatan Hutang & Piutang Aktif</h3>
      <ul id="active-debts-list" class="space-y-3">
          </ul>
    </div>

    <div class="bg-slate-800 rounded-2xl p-6 shadow-xl">
      <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <h3 class="font-bold text-lg text-slate-300">Riwayat Transaksi (Uang Keluar/Masuk)</h3>
        <div class="flex gap-2">
            <select id="filter-category" class="bg-slate-700 text-xs p-2 rounded border-none outline-none">
                <option value="all">Semua Kategori</option>
                <option value="income">Pemasukan</option>
                <option value="expense">Pengeluaran</option>
                <option value="saving">Tabungan</option>
                <option value="debt">Pelunasan Hutang</option>
            </select>
            <select id="filter-month" class="bg-slate-700 text-xs p-2 rounded border-none outline-none">
                <option value="all">Semua Bulan</option>
                <option value="0">Januari</option><option value="1">Februari</option><option value="2">Maret</option>
                <option value="3">April</option><option value="4">Mei</option><option value="5">Juni</option>
                <option value="6">Juli</option><option value="7">Agustus</option><option value="8">September</option>
                <option value="9">Oktober</option><option value="10">November</option><option value="11">Desember</option>
            </select>
        </div>
      </div>
      <ul id="transaction-list" class="space-y-4"></ul>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
